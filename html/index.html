<!DOCTYPE html>
<html lang ="en">
    <head> 
        <title> Document</title>
    </head>
    <body>
        <h1> Hello </h1>
        <h2> Hello </h2>
        <h3> Hello </h3>
        <h4> Hello </h4>
        <h5> Hello </h5>
        <h6> Hello </h6>
        <hr> <!-- linea horizontal, o para separar texto-->
        <p> Chanchito feliz esta muy feliz.</p>
        <hr> 
        <h2>Hola texto extra.</h2>
        <p> Chanchito triste xd, <span style="color:blue">mostraremos uso</span> de la <br><br>etiqueta span</p>
        <!--- la etiqueta <br><br> es para separarm lineas-->
        <hr>
        <p> Este apartado es para el link</p>
        <a target="_blank" href="https://www.google.com"> Ir a google </a>
        <!--- Usamos el target="_blank" para que se abra el link en otra ventana-->
        <hr>
        <p> apartado de img</p>
        <img src="chanchito.jpg" alt="Chanchito feliz" width="200">
    </body>
</html>
