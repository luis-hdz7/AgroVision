<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Organizador de Eventos</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container mt-5"><!-- Contenedor principal-->
  <h1 class="text-center mb-4">📅 Organizador de Eventos</h1>

  <!-- Formulario -->
  <div class="card mb-4"> <!--- Tarjeta de boostrap-->
    <div class="card-body"> 
      <form id="eventForm">
        <div class="row g-3">
          <div class="col-md-6"> <!-- Columna para el titulo-->
            <input type="text" id="title" class="form-control" placeholder="Nombre del evento" required>
          </div>
          <div class="col-md-3">
            <input type="date" id="date" class="form-control" required>
          </div>
          <div class="col-md-3">
            <input type="time" id="time" class="form-control" required>
          </div>
          <div class="col-12">
            <input type="text" id="place" class="form-control" placeholder="Lugar">
          </div>
        </div>

        <button class="btn btn-primary mt-3 w-100">Agregar evento</button>
      </form>
    </div>
  </div>

  <!-- Lista de eventos -->
  <div id="eventList"></div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS propio -->
<script src="js/app.js"></script>
</body>
</html>
